[env]
TERM = "xterm-256color"

[font]
    size = 14 

[font.bold]
family = "JetBrainsMono Nerd Font Mono"
style = "Bold" 

[font.bold_italic]
family = "JetBrainsMono Nerd Font Mono"
style = "Bold Italic" 

[font.italic]
family = "JetBrainsMono Nerd Font Mono"
style = "Italic" 

[font.normal]
family = "JetBrainsMono Nerd Font Mono"

[font.offset]
x = 0
y = 1

[window]
padding.x = 10
padding.y = 10
opacity = 0.7
blur = true
startup_mode = "Maximized"
decorations = "Buttonless"

[general]
import = [
  "~/.config/alacritty/themes/themes/monokai_charcoal.toml"
]
